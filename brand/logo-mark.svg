<!-- Fretwise — Logo mark only (monochrome + 1 accent).
     3 dots ascending across 3 strings = a voicing read bottom-to-top. The lowest dot
     is the root, colored in the brand accent (indigo #635BFF); the rest stay white.
     Black & white base, one accent pop: the app keeps red/blue/amber for degree colors. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="fretwise">
  <title>fretwise</title>
  <rect width="64" height="64" rx="14" fill="#111111"/>
  <g stroke="#3a3a3a" stroke-width="1.5" stroke-linecap="round">
    <path d="M16 12v40M32 12v40M48 12v40"/>
  </g>
  <circle cx="16" cy="42" r="6" fill="#635BFF"/>
  <circle cx="32" cy="30" r="6" fill="#ffffff"/>
  <circle cx="48" cy="18" r="6" fill="#ffffff"/>
</svg>
