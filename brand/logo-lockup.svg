<!-- Fretwise — Primary horizontal lockup: mark + wordmark. Monochrome + indigo accent.
     Wordmark is set lowercase italic (Inter 500). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" role="img" aria-label="fretwise">
  <title>fretwise</title>
  <g transform="translate(8 8)">
    <rect width="64" height="64" rx="14" fill="#111111"/>
    <g stroke="#3a3a3a" stroke-width="1.5" stroke-linecap="round">
      <path d="M16 12v40M32 12v40M48 12v40"/>
    </g>
    <circle cx="16" cy="42" r="6" fill="#635BFF"/>
    <circle cx="32" cy="30" r="6" fill="#ffffff"/>
    <circle cx="48" cy="18" r="6" fill="#ffffff"/>
  </g>
  <text x="88" y="52" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-style="italic" font-size="30" font-weight="500" letter-spacing="-0.3" fill="#111111">fretwise</text>
</svg>
