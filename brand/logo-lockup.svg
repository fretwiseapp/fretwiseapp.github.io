<!-- Chord Lab — Primary horizontal lockup: mark + wordmark.
     Wordmark is rendered as SVG <text> using the system sans stack, so it stays
     crisp at any size and needs no font file. If system-ui renders unpredictably,
     replace with <path> outlines via an icon export step. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" role="img" aria-label="Chord Lab">
  <title>Chord Lab</title>
  <!-- Mark -->
  <g transform="translate(8 8)">
    <rect width="64" height="64" rx="12" fill="#1a1a1a"/>
    <g stroke="#3a3a3a" stroke-width="1" stroke-linecap="round">
      <path d="M12 12v44M20 12v44M28 12v44M36 12v44M44 12v44M52 12v44"/>
      <path d="M8 24h48M8 40h48"/>
    </g>
    <rect x="8" y="10" width="48" height="2" rx="1" fill="#c8b896"/>
    <circle cx="20" cy="32" r="6.5" fill="#c0392b"/>
    <circle cx="36" cy="48" r="6.5" fill="#2e86c1"/>
    <circle cx="52" cy="16" r="6.5" fill="#f39c12"/>
  </g>
  <!-- Wordmark -->
  <text x="88" y="52" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', Inter, system-ui, sans-serif"
        font-size="28" font-weight="700" letter-spacing="3.9" fill="#1a1a1a">CHORD LAB</text>
</svg>
